name: deploy

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

jobs:
  deploy-backend:
    runs-on: ubuntu-22.04
    environment: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Build
        working-directory: backend
        run: |
          npm ci
          npm run build

      - name: Deploy API (Railway)
        uses: bervProject/railway-deploy@v3.0.1
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: bumperbid-api

      - name: Run Prisma migrations
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma migrate deploy

      - name: Deploy worker (Railway)
        uses: bervProject/railway-deploy@v3.0.1
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: bumperbid-worker

      - name: Notify Sentry of release
        uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: bumperbid-backend
        with:
          environment: ${{ github.event.inputs.environment || 'staging' }}

  deploy-frontend:
    runs-on: ubuntu-22.04
    environment: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Vercel deploy (frontend)
        working-directory: frontend
        run: |
          npm install -g vercel@latest
          vercel pull --yes --environment=${{ github.event.inputs.environment || 'preview' }} --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  deploy-admin:
    runs-on: ubuntu-22.04
    environment: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Vercel deploy (admin)
        working-directory: admin
        run: |
          npm install -g vercel@latest
          vercel pull --yes --environment=${{ github.event.inputs.environment || 'preview' }} --token=${{ secrets.VERCEL_TOKEN_ADMIN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN_ADMIN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN_ADMIN }}

  smoke-test:
    runs-on: ubuntu-22.04
    needs: [deploy-backend, deploy-frontend]
    steps:
      - name: Health check
        run: |
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.API_HEALTH_URL }})
            if [ "$code" = "200" ]; then echo "OK"; exit 0; fi
            echo "Attempt $i: HTTP $code"; sleep 5
          done
          exit 1
