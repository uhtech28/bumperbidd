name: ci

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-22.04
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: bumperbid
          POSTGRES_PASSWORD: bumperbid
          POSTGRES_DB: bumperbid_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U bumperbid"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://bumperbid:bumperbid@localhost:5432/bumperbid_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: test_access_secret_for_ci_only_32chars
      JWT_REFRESH_SECRET: test_refresh_secret_for_ci_only_32chars
      COOKIE_SECRET: test_cookie_secret_for_ci_only_32chars
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install
        working-directory: backend
        run: npm ci

      - name: Enable pg_trgm
        run: |
          PGPASSWORD=bumperbid psql -h localhost -U bumperbid -d bumperbid_test \
            -c 'CREATE EXTENSION IF NOT EXISTS pg_trgm;'

      - name: Prisma migrate
        working-directory: backend
        run: npx prisma migrate deploy

      - name: Typecheck
        working-directory: backend
        run: npx tsc --noEmit

      - name: Lint
        working-directory: backend
        run: npm run lint -- --max-warnings=0

      - name: Unit tests
        working-directory: backend
        run: npm test -- --ci --runInBand

      - name: Coverage gate (wallet/bidding)
        working-directory: backend
        run: npm run test:cov -- --testPathPattern="(wallet|bidding)" --ci

      - name: Build
        working-directory: backend
        run: npm run build

  frontend:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Typecheck
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Lint
        working-directory: frontend
        run: npx next lint
      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE: http://localhost:4000/api/v1
          NEXT_PUBLIC_WS_BASE: http://localhost:4000
        run: npm run build

  admin:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        working-directory: admin
        run: npm install
      - name: Typecheck
        working-directory: admin
        run: npx tsc --noEmit
      - name: Build
        working-directory: admin
        env:
          NEXT_PUBLIC_API_BASE: http://localhost:4000/api/v1
        run: npm run build

  security:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: npm audit (backend)
        working-directory: backend
        run: npm audit --omit=dev --audit-level=high || true
      - name: npm audit (frontend)
        working-directory: frontend
        run: npm audit --omit=dev --audit-level=high || true
